name: Build Windows Binaries

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: build-windows-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows binaries
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    permissions:
      contents: write

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libtool \
            autotools-dev \
            automake \
            pkg-config \
            bsdmainutils \
            curl \
            gpg \
            python3 \
            zip \
            g++-mingw-w64-x86-64

      - name: Checkout repository
        id: checkout_primary
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Fallback checkout with retries
        if: steps.checkout_primary.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .git
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"

          attempts=10
          for i in $(seq 1 "${attempts}"); do
            echo "Fallback fetch attempt ${i}/${attempts} for ${GITHUB_SHA}"
            if git -c protocol.version=2 fetch --no-tags --prune --depth=1 origin "${GITHUB_SHA}"; then
              git checkout --force FETCH_HEAD
              git reset --hard FETCH_HEAD
              exit 0
            fi
            sleep $((i * 10))
          done

          echo "Fallback checkout failed after ${attempts} attempts"
          exit 1

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Configure mingw toolchain
        shell: bash
        run: |
          set -euo pipefail
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Restore cached depends
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.4
        with:
          path: ./depends
          key: win64-py311-${{ hashFiles('depends/packages/**') }}

      - name: Download Windows depends sources
        run: make -C ./depends download-win

      - name: Build Windows depends
        run: make -C ./depends HOST=x86_64-w64-mingw32 -j4 PYTHON=python3.11

      - name: Cache depends
        if: github.event_name == 'push' && github.ref_name == 'master'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.4
        with:
          path: ./depends
          key: win64-py311-${{ hashFiles('depends/packages/**') }}

      - name: Autogen
        run: ./autogen.sh

      - name: Configure Windows build
        shell: bash
        run: |
          set -euo pipefail
          CONFIG_SITE=$PWD/depends/x86_64-w64-mingw32/share/config.site \
          ./configure \
            --prefix=/ \
            --host=x86_64-w64-mingw32 \
            --with-gui=qt5 \
            --disable-bench \
            --disable-tests

      - name: Build Windows binaries
        run: make -j4

      - name: Set release/version variables
        shell: bash
        run: |
          set -euo pipefail

          read_define_numeric() {
            local key="$1"
            local value
            value="$(grep -E "^define\(${key},[[:space:]]*[0-9]+\)" configure.ac | sed -E "s/^define\(${key},[[:space:]]*([0-9]+)\)$/\1/" | head -n1)"
            if [ -z "${value}" ]; then
              echo "Failed to parse ${key} from configure.ac" >&2
              exit 1
            fi
            echo "${value}"
          }

          major="$(read_define_numeric "_CLIENT_VERSION_MAJOR")"
          minor="$(read_define_numeric "_CLIENT_VERSION_MINOR")"
          revision="$(read_define_numeric "_CLIENT_VERSION_REVISION")"
          build="$(read_define_numeric "_CLIENT_VERSION_BUILD")"
          rc="$(read_define_numeric "_CLIENT_VERSION_RC")"

          version="${major}.${minor}.${revision}"
          if [ "${build}" != "0" ]; then
            version="${version}.${build}"
          fi
          if [ "${rc}" != "0" ]; then
            version="${version}rc${rc}"
          fi

          short_sha="${GITHUB_SHA::12}"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [[ "${GITHUB_REF_NAME:-}" == v* ]]; then
            release_tag="${GITHUB_REF_NAME}"
            release_name="Litecoin Core Drivechain ${release_tag} (Windows x86_64)"
            release_prerelease="false"
            case "${release_tag,,}" in
              *rc*|*alpha*|*beta*)
                release_prerelease="true"
                ;;
            esac
          else
            release_tag="v${version}-nightly-${short_sha}"
            release_name="Litecoin Core Drivechain v${version} Nightly (Windows x86_64) ${short_sha}"
            release_prerelease="true"
          fi

          release_asset_suffix="${release_tag#v}-win64"
          dist_dir_name="litecoin-core-drivechain-${release_asset_suffix}"
          dist_archive_name="${dist_dir_name}.zip"

          echo "LITECOIN_CORE_VERSION=${version}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${short_sha}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${release_name}" >> "$GITHUB_ENV"
          echo "RELEASE_PRERELEASE=${release_prerelease}" >> "$GITHUB_ENV"
          echo "RELEASE_ASSET_SUFFIX=${release_asset_suffix}" >> "$GITHUB_ENV"
          echo "DIST_DIR_NAME=${dist_dir_name}" >> "$GITHUB_ENV"
          echo "DIST_ARCHIVE_NAME=${dist_archive_name}" >> "$GITHUB_ENV"

      - name: Stage Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/qt
          cp src/litecoind.exe artifacts/
          cp src/litecoin-cli.exe artifacts/
          cp src/litecoin-tx.exe artifacts/
          cp src/qt/litecoin-qt.exe artifacts/qt/

      - name: Package distributable archive
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "artifacts/${DIST_DIR_NAME}/bin"
          cp artifacts/litecoind.exe "artifacts/${DIST_DIR_NAME}/bin/"
          cp artifacts/litecoin-cli.exe "artifacts/${DIST_DIR_NAME}/bin/"
          cp artifacts/litecoin-tx.exe "artifacts/${DIST_DIR_NAME}/bin/"
          cp artifacts/qt/litecoin-qt.exe "artifacts/${DIST_DIR_NAME}/bin/"
          cp COPYING "artifacts/${DIST_DIR_NAME}/"

          (
            cd artifacts
            zip -r "${DIST_ARCHIVE_NAME}" "${DIST_DIR_NAME}"
          )

      - name: Generate release metadata, SBOM, and checksums
        shell: bash
        run: |
          set -euo pipefail

          cat > artifacts/BUILD-METADATA.txt <<EOF
          project=litecoin-core-drivechain
          version=${LITECOIN_CORE_VERSION}
          commit=${GITHUB_SHA}
          short_commit=${SHORT_SHA}
          runner=${RUNNER_OS}-${RUNNER_ARCH}
          host=x86_64-w64-mingw32
          configure_flags=--prefix=/ --host=x86_64-w64-mingw32 --with-gui=qt5 --disable-bench --disable-tests
          build_flags=-j4
          EOF

          python3 contrib/devtools/generate_spdx_sbom.py \
            --input-dir artifacts \
            --output artifacts/SBOM.spdx.json \
            --package-name litecoin-core-drivechain \
            --package-version "${LITECOIN_CORE_VERSION}-${SHORT_SHA}"

          (
            cd artifacts
            sha256sum \
              "${DIST_ARCHIVE_NAME}" \
              litecoind.exe \
              litecoin-cli.exe \
              litecoin-tx.exe \
              qt/litecoin-qt.exe \
              BUILD-METADATA.txt \
              SBOM.spdx.json \
              > SHA256SUMS
          )

      - name: Detect optional signing key
        id: signing_key
        shell: bash
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_GPG_PRIVATE_KEY:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sign SHA256SUMS (optional)
        if: steps.signing_key.outputs.enabled == 'true'
        env:
          RELEASE_GPG_PRIVATE_KEY: ${{ secrets.RELEASE_GPG_PRIVATE_KEY }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          echo "$RELEASE_GPG_PRIVATE_KEY" | gpg --batch --import
          if [ -n "${RELEASE_GPG_PASSPHRASE:-}" ]; then
            gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE" \
              --armor --detach-sign --output artifacts/SHA256SUMS.asc artifacts/SHA256SUMS
          else
            gpg --batch --yes --armor --detach-sign --output artifacts/SHA256SUMS.asc artifacts/SHA256SUMS
          fi

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: litecoin-core-drivechain-${{ env.RELEASE_ASSET_SUFFIX }}
          if-no-files-found: error
          path: |
            artifacts/${{ env.DIST_ARCHIVE_NAME }}
            artifacts/litecoind.exe
            artifacts/litecoin-cli.exe
            artifacts/litecoin-tx.exe
            artifacts/qt/litecoin-qt.exe
            artifacts/BUILD-METADATA.txt
            artifacts/SBOM.spdx.json
            artifacts/SHA256SUMS

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: steps.signing_key.outputs.enabled == 'true'
        with:
          name: litecoin-core-drivechain-${{ env.RELEASE_ASSET_SUFFIX }}-signature
          if-no-files-found: error
          path: artifacts/SHA256SUMS.asc

      - name: Create or reuse GitHub Release
        if: github.event_name == 'push' && (github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/v'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          release_notes="$(cat <<EOF
          Automated Windows x86_64 build for commit ${GITHUB_SHA}.
          Version: v${LITECOIN_CORE_VERSION}
          Ref: ${GITHUB_REF}
          Includes: binaries, ${DIST_ARCHIVE_NAME}, SHA256SUMS, BUILD-METADATA, and SPDX SBOM.
          EOF
          )"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists."
          else
            create_args=(release create "${RELEASE_TAG}" "--title" "${RELEASE_NAME}" "--target" "${GITHUB_SHA}" "--notes" "${release_notes}")
            if [ "${RELEASE_PRERELEASE}" = "true" ]; then
              create_args+=("--prerelease")
            fi
            gh "${create_args[@]}"
          fi

      - name: Upload release assets
        if: github.event_name == 'push' && (github.ref_name == 'master' || startsWith(github.ref, 'refs/tags/v'))
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          assets=(
            "./artifacts/${DIST_ARCHIVE_NAME}#${DIST_ARCHIVE_NAME}"
            "./artifacts/litecoind.exe#litecoind-${RELEASE_ASSET_SUFFIX}.exe"
            "./artifacts/litecoin-cli.exe#litecoin-cli-${RELEASE_ASSET_SUFFIX}.exe"
            "./artifacts/litecoin-tx.exe#litecoin-tx-${RELEASE_ASSET_SUFFIX}.exe"
            "./artifacts/qt/litecoin-qt.exe#litecoin-qt-${RELEASE_ASSET_SUFFIX}.exe"
            "./artifacts/SHA256SUMS#SHA256SUMS-${RELEASE_TAG}-win64.txt"
            "./artifacts/BUILD-METADATA.txt#BUILD-METADATA-${RELEASE_TAG}-win64.txt"
            "./artifacts/SBOM.spdx.json#SBOM-${RELEASE_TAG}-win64.spdx.json"
          )

          if [ -f "./artifacts/SHA256SUMS.asc" ]; then
            assets+=("./artifacts/SHA256SUMS.asc#SHA256SUMS-${RELEASE_TAG}-win64.asc")
          fi

          gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
